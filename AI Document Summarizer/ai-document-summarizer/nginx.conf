server {
    listen 8080;
    server_name _;

    client_max_body_size 50M;

    # ── DNS Resolvers ───────────────────────────────────────────────────────
    # 127.0.0.11 = Docker internal DNS (for VPS docker-compose backend:5000)
    # 169.254.169.253 = AWS VPC DNS (for ECS Fargate - never actually used
    #                   because ALB intercepts /api/* before reaching frontend)
    resolver 127.0.0.11 169.254.169.253 valid=30s ipv6=off;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ALB / Docker Health Check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static assets - long-term caching
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Backend API Proxy
    # VPS (docker-compose): proxies to backend container via docker DNS
    # ECS (ALB):            this block is NEVER reached - ALB routes /api/* 
    #                       directly to backend ECS service before hitting nginx
    location /api/ {
        set $backend_url "http://backend:5000";
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # OAuth & Auth Endpoints Proxy (same as /api/)
    location /auth/ {
        set $backend_url "http://backend:5000";
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # React SPA - all other routes
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
